name: Build & Release VOLITAL

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build-desktop:
    name: Build Desktop Executable
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            suffix: linux
            os_name: Linux
          - os: windows-latest
            suffix: windows.exe
            os_name: Windows
          - os: macos-latest
            suffix: mac
            os_name: macOS

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller --onefile --noconsole --name volital-${{ matrix.suffix }} main.py

      - name: Zip Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path dist\volital-${{ matrix.suffix }} -DestinationPath volital-windows.zip

      - name: Zip Artifact (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r ../volital-mac.zip volital-${{ matrix.suffix }}.app

      - name: Zip Artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          zip ../volital-linux.zip volital-${{ matrix.suffix }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: volital-${{ matrix.os_name }}
          path: volital-*.zip
          retention-days: 1

  build-web:
    name: Build Web (WASM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Build with Pygbag
        run: python -m pygbag --build .

      - name: Zip Web Build
        run: |
          cd build/web
          zip -r ../../volital-web.zip ./*

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: volital-Web
          path: volital-web.zip
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [build-desktop, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare Release Assets
        run: |
          mkdir -p release_assets
          find ./artifacts -name "*.zip" -exec cp {} release_assets/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          generate_release_notes: true
